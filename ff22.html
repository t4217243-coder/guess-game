<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>翻牌猜数字游戏</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f4f4f4;
    text-align:center;
}

/* ===== 状态栏 ===== */
#status{
    background:#111;
    color:#fff;
    padding:12px;
    font-size:14px;
}

/* ===== 手机自适配布局 ===== */
#grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(34px, 1fr));
    gap:6px;
    padding:10px;
    max-width:520px;
    margin:auto;
}

/* ===== 卡片 ===== */
.card{ perspective:800px; }

.inner{
    position:relative;
    width:100%;
    padding-top:100%;
    transform-style:preserve-3d;
    transition:0.6s;
}

.flipped .inner{ transform:rotateY(180deg); }

.front,.back{
    position:absolute;
    top:0;left:0;right:0;bottom:0;
    display:flex;
    justify-content:center;
    align-items:center;
    backface-visibility:hidden;
    border-radius:6px;
    font-size:12px;
}

.front{ background:#ccc; }
.back{ background:#fff; transform:rotateY(180deg); }

/* ===== 游戏颜色系统（完全不动）===== */
.low .back{ background:#7ec8ff; }
.high .back{ background:#ff7a7a; }
.correct .back{ background:#7CFC00; }
.wrong .back{ background:#ffa500; }

.lucky .back{
    border:3px solid gold;
    box-shadow:0 0 10px gold;
}

/* ===== 操作区 ===== */
#panel{
    margin:10px;
    display:flex;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
}

input{
    padding:8px;
    width:140px;
    font-size:14px;
}

button{
    padding:10px 12px;
    font-size:14px;
}

/* ===== 弹窗基础 ===== */
#modal{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
    animation: fadeIn 0.15s ease;
}

#modal-box{
    background:#fff;
    padding:18px;
    border-radius:12px;
    width:80%;
    max-width:280px;
    font-size:14px;
    transition: all 0.2s ease;
}

#modal-box button{
    margin-top:10px;
    width:100%;
}

/* =========================
   🟦 普通弹窗
========================= */
#modal.normal #modal-box{
    background:#fff;
    border:1px solid #ddd;
    box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

/* =========================
   🟨 幸运弹窗（金色发光）
========================= */
#modal.lucky #modal-box{
    background: linear-gradient(135deg, #fff8dc, #fff);
    border:2px solid gold;
    box-shadow:0 0 15px gold, 0 0 30px rgba(255,215,0,0.6);
    animation: glow 1.2s infinite alternate;
}

@keyframes glow{
    from{ box-shadow:0 0 10px gold; }
    to{ box-shadow:0 0 25px gold, 0 0 40px rgba(255,215,0,0.7); }
}

/* =========================
   🟥 胜利弹窗
========================= */
#modal.win #modal-box{
    background: linear-gradient(135deg, #ffffff, #f8f8ff);
    border:2px solid #ff4d4d;
    box-shadow:0 0 20px rgba(255,0,0,0.4);
    transform: scale(1.05);
    animation: popWin 0.25s ease;
}

@keyframes popWin{
    0%{ transform:scale(0.85); }
    100%{ transform:scale(1.05); }
}

/* ===== 手机优化 ===== */
@media (max-width:600px){

#grid{
    grid-template-columns: repeat(auto-fill, minmax(28px, 1fr));
    gap:5px;
}

input{
    width:120px;
}

#modal-box{
    width:90%;
    font-size:15px;
    padding:16px;
}

#modal.win #modal-box{
    transform:scale(1.02);
}

}

/* ===== 动画 ===== */
@keyframes fadeIn{
    from{ opacity:0; }
    to{ opacity:1; }
}
</style>
</head>

<body>

<div id="status">点击开始游戏</div>

<button onclick="startGame()">开始游戏</button>

<div id="grid"></div>

<div id="panel">
    <input id="guessInput" type="number" placeholder="猜数字"/>
    <button onclick="guess()">猜数</button>
</div>

<!-- 弹窗 -->
<div id="modal">
    <div id="modal-box">
        <p id="modal-text"></p >
        <button onclick="closeModal()">关闭</button>
    </div>
</div>

<script>

/* ===== 基础变量（不动）===== */
let target = 0;
let numbers = [];
let gameOver = true;
let min = 1;
let max = 100;

let luckySet = new Set();

/* ===== 数据池（不动）===== */
const normalData = ["15","20","25"];
const paramData = ["40","50","60"];

const toolPool = [
"巴掌","戒尺","猫爪","亚克力板","藤条","小木板",
"短皮拍","长皮拍","小红","颠肉勺","厚木板"
];

const posePool = [
"跪趴","平趴","尿布式","半趴桌子","站立扶墙","otk"
];

const luckyToolPool = ["小红","猫爪","小板子","颠肉勺","戒尺"];

/* ===== 弹窗控制（新增：分层UI）===== */
function setModalType(type){
    const modal = document.getElementById("modal");
    modal.className = "";

    if(type){
        modal.classList.add(type);
    }
}

function showModal(text, type="normal"){
    document.getElementById("modal-text").innerText = text;
    setModalType(type);
    document.getElementById("modal").style.display = "flex";
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}

function showWinModal(){
    showModal("🎉 恭喜猜中，不用再受罚了，我想应该挨的挺多的吧，嘻嘻","win");
}

function rand(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

/* ===== 幸运数 ===== */
function generateLucky(){
    luckySet.clear();
    target = Math.floor(Math.random()*100)+1;

    let minR = Math.max(1,target-5);
    let maxR = Math.min(100,target+5);

    while(luckySet.size < 2){
        let n = Math.floor(Math.random()*(maxR-minR+1))+minR;
        if(n !== target) luckySet.add(n);
    }

    while(luckySet.size < 5){
        let n = Math.floor(Math.random()*100)+1;
        if(n !== target) luckySet.add(n);
    }
}

/* ===== 开始 ===== */
function startGame(){
    numbers = [];
    gameOver = false;
    min = 1;
    max = 100;

    generateLucky();

    for(let i=1;i<=100;i++){
        numbers.push(i);
    }

    numbers.sort(()=>Math.random()-0.5);

    document.getElementById("status").innerText =
        "当前范围：" + min + " - " + max;

    render();
}

/* ===== 渲染 ===== */
function render(){
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    numbers.forEach(num=>{
        const card = document.createElement("div");
        card.className = "card";

        if(luckySet.has(num)) card.classList.add("lucky");

        const inner = document.createElement("div");
        inner.className = "inner";

        const front = document.createElement("div");
        front.className = "front";
        front.innerText = "?";

        const back = document.createElement("div");
        back.className = "back";
        back.innerText = num;

        inner.appendChild(front);
        inner.appendChild(back);
        card.appendChild(inner);

        /* ===== 点击逻辑（不动）===== */
        card.onclick = function(){

            if(gameOver) return;
            if(card.classList.contains("flipped")) return;

            card.classList.add("flipped");

            if(luckySet.has(num)){
                showModal(
                    "恭喜幸运数字\n数量：100\n工具：" +
                    rand(luckyToolPool) + "\n姿势：跪趴\n3-7过报数",
                    "lucky"
                );
                return;
            }

            let result =
                num == target ? "猜中" :
                num < target ? "偏小" : "偏大";

            showModal(
                num + result + "\n数量：" + rand(normalData) +
                "\n工具：" + rand(toolPool) +
                "\n姿势：" + rand(posePool),
                "normal"
            );

            if(num == target){
                card.classList.add("correct");
                gameOver = true;
                showWinModal();
                return;
            }

            if(num < target){
                card.classList.add("low");
                min = Math.max(min,num);
            }else{
                card.classList.add("high");
                max = Math.min(max,num);
            }

            document.getElementById("status").innerText =
            "当前范围：" + min + " - " + max;
        };

        grid.appendChild(card);
    });
}

/* ===== guess ===== */
function guess(){

    if(gameOver) return;

    let val = parseInt(document.getElementById("guessInput").value);
    if(!val) return;

    let cards = document.querySelectorAll(".card");

    numbers.forEach((n,i)=>{

        if(n == val){

            cards[i].classList.add("flipped");

            if(luckySet.has(n)){
                showModal(
                    "恭喜幸运数字\n数量：100\n工具：" +
                    rand(luckyToolPool) + "\n姿势：跪趴\n3-7过报数",
                    "lucky"
                );
            }else{
                showModal(
                    "猜错了\n数量：" + rand(paramData) +
                    "\n工具：" + rand(toolPool) +
                    "\n姿势：" + rand(posePool),
                    "normal"
                );
            }

            if(n == target){
                cards[i].classList.add("correct");
                gameOver = true;
                showWinModal();
            }else{
                cards[i].classList.add("wrong");
            }
        }
    });
}

</script>

</body>
</html>
